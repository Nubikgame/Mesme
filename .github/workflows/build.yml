name: Build Mesme APK

# Эта строчка означает, что сборка будет запускаться вручную, по кнопке
on:
  workflow_dispatch: 

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      - name: Скачиваем твой код
        uses: actions/checkout@v4

      - name: Устанавливаем Java (нужна для Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Устанавливаем Flutter (движок интерфейса Flet)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Устанавливаем Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Устанавливаем Flet-компилятор
        run: pip install flet

      - name: Собираем APK-файл! 🚀
        # Команда собирает папку frontend, где лежит твой main.py
        run: flet build apk frontend --project-name mesme --product "Mesme"

      - name: Загружаем готовый APK
        uses: actions/upload-artifact@v4
        with:
          name: Mesme-App-APK
          path: build/apk/**/*.apk